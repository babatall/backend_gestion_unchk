spring.application.name=GestionUnchk

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_unchk?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Tall12
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080


# ==========================================
# JWT CONFIGURATION
# ==========================================
app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposesOnly1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
app.jwt.expiration=86400000

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging.level.root=INFO
logging.level.com.tall.GestionUnchk=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/application.log

# ==========================================
# SWAGGER/OPENAPI CONFIGURATION
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.url=/v3/api-docs

# ==========================================
# VALIDATION CONFIGURATION
# ==========================================
spring.mvc.throw-exception-if-no-handler-found=true
spring.resources.add-mappings=false

# ==========================================
# JACKSON CONFIGURATION
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
